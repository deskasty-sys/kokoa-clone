<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KakaoTalk - More</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/more.css" />
</head>
<body>
  <div class="screen">
    <header class="status-bar">
      <span>9:41</span>
      <div class="status-bar__icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </header>

    <div class="section-header">
      <h1>더보기</h1>
      <div class="section-header__icons">
        <a href="#"><i class="fa-solid fa-bell"></i></a>
        <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i></a>
      </div>
    </div>

    <a href="settings.html" class="more-profile">
      <div class="more-profile__avatar">승</div>
      <div class="more-profile__info">
        <p class="more-profile__name">승훈</p>
        <p class="more-profile__status">프로필 관리</p>
      </div>
      <button class="more-profile__btn">QR 코드</button>
    </a>

    <div class="service-grid">
      <a href="#" class="service">
        <div class="service__icon"><i class="fa-solid fa-gift"></i></div>
        <span class="service__label">선물하기</span>
      </a>
      <a href="#" class="service">
        <div class="service__icon"><i class="fa-solid fa-cart-shopping"></i></div>
        <span class="service__label">쇼핑하기</span>
      </a>
      <a href="#" class="service">
        <div class="service__icon"><i class="fa-solid fa-images"></i></div>
        <span class="service__label">이모티콘</span>
      </a>
      <a href="#" class="service">
        <div class="service__icon"><i class="fa-solid fa-circle-user"></i></div>
        <span class="service__label">프로필</span>
      </a>
      <a href="#" class="service">
        <div class="service__icon"><i class="fa-solid fa-envelope"></i></div>
        <span class="service__label">메일</span>
      </a>
      <a href="#" class="service">
        <div class="service__icon"><i class="fa-solid fa-calendar-days"></i></div>
        <span class="service__label">캘린더</span>
      </a>
      <a href="#" class="service">
        <div class="service__icon"><i class="fa-solid fa-list-check"></i></div>
        <span class="service__label">서랍</span>
      </a>
      <a href="#" class="service">
        <div class="service__icon"><i class="fa-solid fa-music"></i></div>
        <span class="service__label">멜론</span>
      </a>
      <a href="#" class="service">
        <div class="service__icon"><i class="fa-solid fa-credit-card"></i></div>
        <span class="service__label">페이</span>
      </a>
      <a href="#" class="service">
        <div class="service__icon"><i class="fa-solid fa-piggy-bank"></i></div>
        <span class="service__label">뱅크</span>
      </a>
      <a href="#" class="service">
        <div class="service__icon"><i class="fa-solid fa-car"></i></div>
        <span class="service__label">택시</span>
      </a>
      <a href="#" class="service">
        <div class="service__icon"><i class="fa-solid fa-headset"></i></div>
        <span class="service__label">고객센터</span>
      </a>
    </div>

    <a href="#" class="more-banner">
      <div class="more-banner__icon"><i class="fa-solid fa-bolt"></i></div>
      <div>
        <p class="more-banner__title">카카오 메이커스</p>
        <p class="more-banner__desc">오늘만 30% 할인 기획전</p>
      </div>
    </a>

    <a href="#" class="more-banner">
      <div class="more-banner__icon" style="background-color:#64b5f6; color:#fff;">
        <i class="fa-solid fa-graduation-cap"></i>
      </div>
      <div>
        <p class="more-banner__title">새로운 기능을 만나보세요</p>
        <p class="more-banner__desc">멀티프로필 · AI 어시스턴트 출시</p>
      </div>
    </a>
  </div>

  <nav class="nav-bar">
    <a href="friends.html">
      <i class="fa-solid fa-user"></i>
      <span>친구</span>
    </a>
    <a href="chats.html">
      <i class="fa-solid fa-comment"></i>
      <span>채팅</span>
      <span class="nav-bar__badge">12</span>
    </a>
    <a href="find.html">
      <i class="fa-solid fa-compass"></i>
      <span>오픈채팅</span>
    </a>
    <a href="find.html">
      <i class="fa-solid fa-bullseye"></i>
      <span>쇼핑</span>
    </a>
    <a href="more.html" class="active">
      <i class="fa-solid fa-ellipsis"></i>
      <span>더보기</span>
    </a>
  </nav>
</body>
</html>
