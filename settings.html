<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KakaoTalk - Settings</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/settings.css" />
</head>
<body>
  <div class="screen" style="padding-bottom: 40px;">
    <header class="status-bar">
      <span>9:41</span>
      <div class="status-bar__icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </header>

    <div class="settings-header">
      <a href="more.html" class="settings-header__back">
        <i class="fa-solid fa-chevron-left"></i>
      </a>
      <h1 class="settings-header__title">설정</h1>
    </div>

    <div class="settings-group">
      <p class="settings-group__title">내 계정</p>
      <ul class="settings-list">
        <li>
          <span class="settings-list__label">
            <i class="fa-solid fa-user"></i>
            내 프로필
          </span>
          <span class="settings-list__meta">
            승훈
            <i class="fa-solid fa-chevron-right"></i>
          </span>
        </li>
        <li>
          <span class="settings-list__label">
            <i class="fa-solid fa-circle-user"></i>
            카카오계정
          </span>
          <span class="settings-list__meta">
            <i class="fa-solid fa-chevron-right"></i>
          </span>
        </li>
        <li>
          <span class="settings-list__label">
            <i class="fa-solid fa-shield-halved"></i>
            개인/보안
          </span>
          <span class="settings-list__meta">
            <i class="fa-solid fa-chevron-right"></i>
          </span>
        </li>
      </ul>
    </div>

    <div class="settings-group">
      <p class="settings-group__title">알림</p>
      <ul class="settings-list">
        <li>
          <span class="settings-list__label">
            <i class="fa-solid fa-bell"></i>
            알림
          </span>
          <span class="settings-list__meta">
            전체 켜짐
            <i class="fa-solid fa-chevron-right"></i>
          </span>
        </li>
        <li>
          <span class="settings-list__label">
            <i class="fa-solid fa-volume-high"></i>
            소리·진동
          </span>
          <span class="settings-list__meta">
            <i class="fa-solid fa-chevron-right"></i>
          </span>
        </li>
        <li>
          <span class="settings-list__label">
            <i class="fa-solid fa-moon"></i>
            방해금지 시간
          </span>
          <span class="settings-list__meta">
            22:00 - 07:00
            <i class="fa-solid fa-chevron-right"></i>
          </span>
        </li>
      </ul>
    </div>

    <div class="settings-group">
      <p class="settings-group__title">화면</p>
      <ul class="settings-list">
        <li>
          <span class="settings-list__label">
            <i class="fa-solid fa-circle-half-stroke"></i>
            테마
          </span>
          <span class="settings-list__meta">
            시스템 설정
            <i class="fa-solid fa-chevron-right"></i>
          </span>
        </li>
        <li>
          <span class="settings-list__label">
            <i class="fa-solid fa-text-height"></i>
            글자 크기
          </span>
          <span class="settings-list__meta">
            보통
            <i class="fa-solid fa-chevron-right"></i>
          </span>
        </li>
        <li>
          <span class="settings-list__label">
            <i class="fa-solid fa-language"></i>
            언어
          </span>
          <span class="settings-list__meta">
            한국어
            <i class="fa-solid fa-chevron-right"></i>
          </span>
        </li>
      </ul>
    </div>

    <div class="settings-group">
      <p class="settings-group__title">기타</p>
      <ul class="settings-list">
        <li>
          <span class="settings-list__label">
            <i class="fa-solid fa-circle-info"></i>
            버전 정보
          </span>
          <span class="settings-list__meta">
            <span class="settings-list__badge">NEW</span>
            v10.5.2
          </span>
        </li>
        <li>
          <span class="settings-list__label">
            <i class="fa-solid fa-circle-question"></i>
            고객센터
          </span>
          <span class="settings-list__meta">
            <i class="fa-solid fa-chevron-right"></i>
          </span>
        </li>
        <li>
          <a href="index.html" class="settings-list__label" style="color:#ff3b30;">
            <i class="fa-solid fa-right-from-bracket"></i>
            로그아웃
          </a>
        </li>
      </ul>
    </div>
  </div>
</body>
</html>
