<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KakaoTalk - Find</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/find.css" />
</head>
<body>
  <div class="screen">
    <header class="status-bar">
      <span>9:41</span>
      <div class="status-bar__icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </header>

    <div class="section-header">
      <h1>발견</h1>
      <div class="section-header__icons">
        <a href="#"><i class="fa-solid fa-magnifying-glass"></i></a>
        <a href="settings.html"><i class="fa-solid fa-gear"></i></a>
      </div>
    </div>

    <div class="find-tabs">
      <a href="#" class="active">전체</a>
      <a href="#">뉴스</a>
      <a href="#">쇼핑</a>
      <a href="#">스포츠</a>
      <a href="#">엔터</a>
    </div>

    <div class="shortcut-grid">
      <a href="#" class="shortcut">
        <div class="shortcut__icon"><i class="fa-solid fa-gamepad"></i></div>
        <span class="shortcut__label">게임</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut__icon"><i class="fa-solid fa-calendar-check"></i></div>
        <span class="shortcut__label">예약</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut__icon"><i class="fa-solid fa-utensils"></i></div>
        <span class="shortcut__label">주문</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut__icon"><i class="fa-solid fa-cart-shopping"></i></div>
        <span class="shortcut__label">쇼핑</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut__icon"><i class="fa-solid fa-newspaper"></i></div>
        <span class="shortcut__label">뉴스</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut__icon"><i class="fa-solid fa-music"></i></div>
        <span class="shortcut__label">멜론</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut__icon"><i class="fa-solid fa-tv"></i></div>
        <span class="shortcut__label">웹툰</span>
      </a>
      <a href="#" class="shortcut">
        <div class="shortcut__icon"><i class="fa-solid fa-ticket"></i></div>
        <span class="shortcut__label">티켓</span>
      </a>
    </div>

    <section class="find-section">
      <h2 class="find-section__title">오늘의 추천</h2>

      <a href="#" class="banner">
        <div class="banner__icon"><i class="fa-solid fa-gift"></i></div>
        <div class="banner__content">
          <p class="banner__title">친구에게 깜짝 선물 보내기</p>
          <p class="banner__desc">생일 알림 받은 친구가 3명 있어요</p>
        </div>
        <i class="fa-solid fa-chevron-right" style="color:#bbb;"></i>
      </a>

      <a href="#" class="feed-card">
        <div class="feed-card__cover">5월의 인기 콘텐츠</div>
        <div class="feed-card__body">
          <p class="feed-card__title">이번 주 사람들이 가장 많이 본 영상</p>
          <p class="feed-card__desc">큐레이션 · 12개 콘텐츠</p>
        </div>
      </a>

      <a href="#" class="feed-card">
        <div class="feed-card__cover" style="background: linear-gradient(135deg,#64b5f6,#1976d2);">새로운 오픈채팅</div>
        <div class="feed-card__body">
          <p class="feed-card__title">관심사가 비슷한 사람들과 대화해보세요</p>
          <p class="feed-card__desc">코딩, 운동, 독서 채팅방 추천</p>
        </div>
      </a>
    </section>
  </div>

  <nav class="nav-bar">
    <a href="friends.html">
      <i class="fa-solid fa-user"></i>
      <span>친구</span>
    </a>
    <a href="chats.html">
      <i class="fa-solid fa-comment"></i>
      <span>채팅</span>
      <span class="nav-bar__badge">12</span>
    </a>
    <a href="find.html" class="active">
      <i class="fa-solid fa-compass"></i>
      <span>오픈채팅</span>
    </a>
    <a href="find.html">
      <i class="fa-solid fa-bullseye"></i>
      <span>쇼핑</span>
    </a>
    <a href="more.html">
      <i class="fa-solid fa-ellipsis"></i>
      <span>더보기</span>
    </a>
  </nav>
</body>
</html>
