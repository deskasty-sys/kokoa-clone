<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KakaoTalk - 민지</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/chat.css" />
</head>
<body>
  <div class="screen screen--yellow" style="padding-bottom: 0;">
    <header class="status-bar">
      <span>9:41</span>
      <div class="status-bar__icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </header>

    <div class="chat-header">
      <a href="chats.html" class="chat-header__back">
        <i class="fa-solid fa-chevron-left"></i>
      </a>
      <span class="chat-header__title">민지</span>
      <div class="chat-header__icons">
        <i class="fa-solid fa-magnifying-glass"></i>
        <i class="fa-solid fa-bars"></i>
      </div>
    </div>

    <div class="chat-body">
      <div class="chat-date">2026년 5월 28일 목요일</div>

      <div class="msg msg--received">
        <div class="msg__avatar">민</div>
        <div class="msg__content">
          <p class="msg__name">민지</p>
          <div class="msg__bubble-wrap">
            <div class="msg__bubble">안녕! 오늘 뭐해? 😊</div>
            <span class="msg__time">오후 7:30</span>
          </div>
        </div>
      </div>

      <div class="msg msg--sent">
        <div class="msg__content">
          <div class="msg__bubble-wrap">
            <div class="msg__bubble">집에서 코딩 중이야 ㅋㅋ</div>
            <span class="msg__time">오후 7:32</span>
          </div>
        </div>
      </div>

      <div class="msg msg--received">
        <div class="msg__avatar">민</div>
        <div class="msg__content">
          <div class="msg__bubble-wrap">
            <div class="msg__bubble">대단하다 👍 저녁은 먹었어?</div>
            <span class="msg__time">오후 7:33</span>
          </div>
        </div>
      </div>

      <div class="msg msg--sent">
        <div class="msg__content">
          <div class="msg__bubble-wrap">
            <div class="msg__bubble">아직! 너는?</div>
            <span class="msg__time">오후 7:35</span>
          </div>
        </div>
      </div>

      <div class="msg msg--received">
        <div class="msg__avatar">민</div>
        <div class="msg__content">
          <div class="msg__bubble-wrap">
            <div class="msg__bubble">나도! 같이 먹을래? 🍜</div>
            <span class="msg__time">오후 8:42</span>
          </div>
        </div>
      </div>

      <div class="msg msg--received">
        <div class="msg__avatar">민</div>
        <div class="msg__content">
          <div class="msg__bubble-wrap">
            <div class="msg__bubble">근처 라멘집 새로 생겼더라구</div>
            <span class="msg__time">오후 8:42</span>
          </div>
        </div>
      </div>

      <div class="msg msg--sent">
        <div class="msg__content">
          <div class="msg__bubble-wrap">
            <div class="msg__bubble">좋아! 30분 뒤에 만나자 🙌</div>
            <span class="msg__time">오후 8:44</span>
          </div>
        </div>
      </div>
    </div>

    <div class="chat-input">
      <i class="fa-solid fa-plus chat-input__icon"></i>
      <input type="text" class="chat-input__field" placeholder="메시지 입력" />
      <i class="fa-regular fa-face-smile chat-input__icon"></i>
      <button class="chat-input__send">
        <i class="fa-solid fa-arrow-up"></i>
      </button>
    </div>
  </div>
</body>
</html>
