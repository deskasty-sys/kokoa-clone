<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KakaoTalk - Login</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>
  <div class="screen screen--yellow">
    <header class="status-bar">
      <span>9:41</span>
      <div class="status-bar__icons">
        <i class="fa-solid fa-signal"></i>
        <i class="fa-solid fa-wifi"></i>
        <i class="fa-solid fa-battery-full"></i>
      </div>
    </header>

    <main class="login">
      <div class="login__logo">
        <h1>kakaotalk</h1>
        <p>친구와 더 가까이, 카카오톡으로 시작하세요</p>
      </div>

      <form class="login__form" action="friends.html">
        <input type="email" placeholder="이메일 또는 전화번호" />
        <input type="password" placeholder="비밀번호" />
        <button type="submit" class="login__btn">로그인</button>
      </form>

      <div class="login__links">
        <a href="#">카카오 ID로 로그인</a>
        <a href="#">이메일 로그인</a>
        <a href="#">비밀번호 찾기</a>
      </div>

      <div class="login__bottom">
        <a href="friends.html">새로운 카카오계정 만들기</a>
      </div>
    </main>
  </div>
</body>
</html>
